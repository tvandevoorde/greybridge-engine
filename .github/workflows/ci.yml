name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

env:
  GODOT_VERSION: "4.6.1"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot ${{ env.GODOT_VERSION }} (headless)
        run: |
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" \
            -O godot.zip
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          godot --version

      - name: Unit tests — ability_scores
        working-directory: src
        run: godot --headless --script ./tests/unit/rules_engine/test_ability_scores.gd

      - name: Unit tests — action_economy
        working-directory: src
        run: godot --headless --script ./tests/unit/rules_engine/test_action_economy.gd

