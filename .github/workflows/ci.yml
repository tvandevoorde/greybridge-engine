name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

env:
  GODOT_VERSION: "4.4.1"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot ${{ env.GODOT_VERSION }} (headless)
        run: |
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" \
            -O godot.zip
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          godot --version

      - name: Unit tests — ability_scores
        working-directory: src
        run: godot --headless --script ../tests/unit/rules_engine/test_ability_scores.gd

      - name: Unit tests — attack_resolver
        working-directory: src
        run: godot --headless --script ../tests/unit/rules_engine/test_attack_resolver.gd

      - name: Unit tests — dice_roller
        working-directory: src
        run: godot --headless --script ../tests/unit/rules_engine/test_dice_roller.gd

      - name: Unit tests — proficiency
        working-directory: src
        run: godot --headless --script ../tests/unit/rules_engine/test_proficiency.gd

      - name: Unit tests — saving_throw
        working-directory: src
        run: godot --headless --script ../tests/unit/rules_engine/test_saving_throw.gd

      - name: Unit tests — skill_check
        working-directory: src
        run: godot --headless --script ../tests/unit/rules_engine/test_skill_check.gd

      - name: Integration test — combat harness
        working-directory: src
        run: godot --headless --script ../tests/integration/test_combat_harness.gd
