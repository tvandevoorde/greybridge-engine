name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

env:
  GODOT_VERSION: "4.6.1"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Godot ${{ env.GODOT_VERSION }} (headless)
        run: |
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" \
            -O godot.zip
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          godot --version

      - name: Unit tests — ability_scores
        working-directory: src
        run: godot --headless --script ./tests/unit/rules_engine/test_ability_scores.gd

      - name: Unit tests — action_economy
        working-directory: src
        run: godot --headless --script ./tests/unit/rules_engine/test_action_economy.gd

      - name: Unit tests — armor_class
        working-directory: src
        run: godot --headless --script ./tests/unit/rules_engine/test_armor_class.gd

      - name: Unit tests — attack_resolver
        working-directory: src
        run: godot --headless --script ./tests/unit/rules_engine/test_attack_resolver.gd

      - name: Unit tests — combat_results
        working-directory: src
        run: godot --headless --script ./tests/unit/rules_engine/test_combat_results.gd

      - name: Unit tests — concentration
        working-directory: src
        run: godot --headless --script ./tests/unit/rules_engine/test_concentration.gd

      - name: Unit tests — condition_manager
        working-directory: src
        run: godot --headless --script ./tests/unit/rules_engine/test_condition_manager.gd

      - name: Unit tests — damage_calculator
        working-directory: src
        run: godot --headless --script ./tests/unit/rules_engine/test_damage_calculator.gd

      - name: Unit tests — damage_roll
        working-directory: src
        run: godot --headless --script ./tests/unit/rules_engine/test_damage_roll.gd

      - name: Unit tests — death_saving_throw
        working-directory: src
        run: godot --headless --script ./tests/unit/rules_engine/test_death_saving_throw.gd

      - name: Unit tests — dice_roller
        working-directory: src
        run: godot --headless --script ./tests/unit/rules_engine/test_dice_roller.gd

      - name: Unit tests — hit_points
        working-directory: src
